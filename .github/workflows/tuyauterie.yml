name: Reusable Tuyauterie Build

on:
  workflow_call:
    inputs:
      tuyauterie-path:
        description: 'Path to .tuyauterie.yaml file (deprecated, use tuyauterie-files instead)'
        required: false
        default: '.tuyauterie.yaml'
        type: string
      tuyauterie-files:
        description: 'Array of paths to .tuyauterie.yaml files (matrix strategy)'
        required: false
        default: '[".tuyauterie.yaml"]'
        type: string
      github-runner:
        description: 'The GitHub runner to use'
        required: false
        default: 'ubuntu-latest'
        type: string
      github-event:
        description: 'GitHub event that triggered the workflow'
        required: false
        default: 'push'
        type: string
    secrets:
      GITOPS_REPOSITORY_TOKEN:
        description: 'GitHub token for GitOps repository'
        required: false 

jobs:
  setup:
    runs-on: ${{ inputs.github-runner }}
    outputs:
      matrix: ${{ steps.parse.outputs.matrix }}
      files: ${{ steps.parse.outputs.files }}
      publishing: ${{ steps.parse.outputs.publishing }}
      gitops_deployment: ${{ steps.parse.outputs.gitops_deployment }}
      gitops_matrix: ${{ steps.parse.outputs.gitops_matrix }}
      gitops_repository: ${{ steps.parse.outputs.gitops_repository }}
    steps:
      - uses: actions/checkout@v6

      - name: Set up js-yaml
        run: npm install js-yaml

      - id: parse
        name: Parse all tuyauterie files
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            const yaml = require('./node_modules/js-yaml');
            
            const filesInput = '${{ inputs.tuyauterie-files }}';
            const pathInput = '${{ inputs.tuyauterie-path }}';
            
            let files;
            if (filesInput && filesInput !== '[]') {
              files = JSON.parse(filesInput);
            } else if (pathInput && pathInput !== '.tuyauterie.yaml') {
              files = [pathInput];
            } else {
              files = ['.tuyauterie.yaml'];
            }
            
            const matrix = files.map(f => ({
              file: f,
              key: f.replace(/[^a-zA-Z0-9]/g, '_')
            }));
            
            const configs = {};
            
            for (const file of files) {
              const sanitized = file.replace(/[^a-zA-Z0-9]/g, '_');
              try {
                const content = fs.readFileSync(file, 'utf8');
                const config = yaml.load(content);
                
                const buildType = config?.build?.type ?? 'unknown';
                const projectPath = config?.build?.path ?? '.';
                const uploadArtifacts = config?.build?.upload_artifacts ?? false;
                const testCmd = config?.build?.test_cmd ?? '';
                const Dockerfile = config?.build?.dockerfile ?? 'Dockerfile';
                const buildDocker = fs.existsSync(Dockerfile);
                const releaseOnTag = config?.release?.on_tag ?? true;
                const rollingRelease = config?.release?.rolling ?? false;
                const artifactBaseName = config?.build?.artifact_name ?? '${{ github.event.repository.name }}';

                const ref = process.env.GITHUB_REF ?? '';
                const isTag = ref.startsWith('refs/tags/');
                const isMainBranch = ref === 'refs/heads/main' || ref === 'refs/heads/master';
                const tagName = isTag ? ref.replace('refs/tags/', '') : '';
                const publishing = (releaseOnTag && isTag) || (rollingRelease && isMainBranch);
                
                const enableGitops = config?.deploy?.gitops?.enable ?? false;
                const gitopsDeployment = enableGitops && publishing;
                const gitopsRepo = config?.deploy?.gitops?.repository ?? '';
                const gitopsManifest = config?.deploy?.gitops?.manifest ?? '';
                
                configs[sanitized] = {
                  file,
                  build_type: buildType,
                  build_docker: buildDocker,
                  publish: publishing,
                  upload_artifacts: uploadArtifacts,
                  test_cmd: testCmd,
                  is_tag: isTag,
                  tag_name: tagName,
                  artifact_name: (publishing && tagName) ? `${artifactBaseName}-${tagName}` : artifactBaseName,
                  artifact_base_name: artifactBaseName,
                  project_path: projectPath,
                  gitops_deployment: gitopsDeployment,
                  gitops_target_repository: gitopsRepo,
                  gitops_target_manifest: gitopsManifest
                };
                
                console.log(`Parsed ${file}: ${JSON.stringify(configs[sanitized])}`);
              } catch (e) {
                console.error(`Error parsing ${file}: ${e.message}`);
              }
            }
            
            const publishing = Object.values(configs).some(c => c.publish);
            const gitopsDeployment = Object.values(configs).some(c => c.gitops_deployment);
            const gitopsMatrix = Object.values(configs)
              .filter(c => c.gitops_deployment)
              .map(c => ({
                repository: c.gitops_target_repository,
                manifest: c.gitops_target_manifest,
                version: c.tag_name
              }));
            const gitopsRepository = gitopsMatrix[0]?.repository ?? '';

            core.setOutput('matrix', JSON.stringify(matrix));
            core.setOutput('files', JSON.stringify(configs));
            core.setOutput('publishing', String(publishing));
            core.setOutput('gitops_deployment', String(gitopsDeployment));
            core.setOutput('gitops_matrix', JSON.stringify(gitopsMatrix));
            core.setOutput('gitops_repository', gitopsRepository);

  build:
    needs: setup
    runs-on: ${{ inputs.github-runner }}
    strategy:
      matrix:
        value: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: ${{ matrix.value.file }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Get config for this matrix job
        id: config
        uses: actions/github-script@v8
        with:
          script: |
            const configs = JSON.parse('${{ needs.setup.outputs.files }}');
            const key = '${{ matrix.value.key }}';
            const config = configs[key];
            if (!config) {
              core.setFailed('No config found for ${{ matrix.value.file }}');
            }
            core.setOutput('build_type', config.build_type);
            core.setOutput('project_path', config.project_path);
            core.setOutput('publish', config.publish);
            core.setOutput('upload_artifacts', config.upload_artifacts);
            core.setOutput('test_cmd', config.test_cmd);
            core.setOutput('artifact_name', config.artifact_name);

      - name: Build (Golang)
        if: steps.config.outputs.build_type == 'golang'
        uses: notarock/tuyauterie/.github/actions/build-golang@main
        with:
          project-path: ${{ steps.config.outputs.project_path }}
          upload-artifact: ${{ steps.config.outputs.publish == 'true' && steps.config.outputs.upload_artifacts == 'true' }}
          artifact-name: ${{ steps.config.outputs.artifact_name }}

      - name: Build (Python)
        if: steps.config.outputs.build_type == 'python'
        uses: notarock/tuyauterie/.github/actions/build-python@main
        with:
          project-path: ${{ steps.config.outputs.project_path }}

      - name: Build (Nix)
        if: steps.config.outputs.build_type == 'nix'
        uses: notarock/tuyauterie/.github/actions/build-nix@main
        with:
          project-path: ${{ steps.config.outputs.project_path }}

      - name: Build (Node)
        if: steps.config.outputs.build_type == 'node'
        uses: notarock/tuyauterie/.github/actions/build-node@main
        with:
          project-path: ${{ steps.config.outputs.project_path }}
          upload-artifact: ${{ steps.config.outputs.publish == 'true' && steps.config.outputs.upload_artifacts == 'true' }}
          artifact-name: ${{ steps.config.outputs.artifact_name }}

      - name: Run test command
        if: steps.config.outputs.test_cmd != ''
        run: ${{ steps.config.outputs.test_cmd }}
        working-directory: ${{ steps.config.outputs.project_path }}

  build-docker:
    needs: [setup, build]
    runs-on: ${{ inputs.github-runner }}
    strategy:
      matrix:
        value: ${{ fromJSON(needs.setup.outputs.matrix) }}
    name: ${{ matrix.value.file }}
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Get config for this matrix job
        id: config
        uses: actions/github-script@v8
        with:
          script: |
            const configs = JSON.parse('${{ needs.setup.outputs.files }}');
            const key = '${{ matrix.value.key }}';
            const config = configs[key];
            if (!config) {
              core.setFailed('No config found for ${{ matrix.value.file }}');
            }
            if (!config.build_docker) {
              core.setOutput('skip', 'true');
              return;
            }
            core.setOutput('build_docker', 'true');
            core.setOutput('publish', config.publish);
            core.setOutput('upload_artifacts', config.upload_artifacts);
            core.setOutput('artifact_base_name', config.artifact_base_name);
            core.setOutput('project_path', config.project_path);

      - name: Set up QEMU
        if: steps.config.outputs.build_docker == 'true'
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        if: steps.config.outputs.build_docker == 'true'
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        if: steps.config.outputs.build_docker == 'true' && steps.config.outputs.publish == 'true'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.config.outputs.build_docker == 'true'
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ steps.config.outputs.artifact_base_name }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest

      - name: Build and push
        if: steps.config.outputs.build_docker == 'true'
        uses: docker/build-push-action@v7
        with:
          context: ${{ steps.config.outputs.project_path }}
          push: ${{ steps.config.outputs.publish == 'true' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release-log:
    needs: [setup, build, build-docker]
    if: |
      always() &&
      needs.setup.outputs.publishing == 'true' &&
      needs.setup.result == 'success' &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs.build-docker.result == 'success' || needs.build-docker.result == 'skipped' || needs.build-docker.result == 'failure')
    runs-on: ${{ inputs.github-runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate consolidated commit log
        run: |
          git fetch --tags
          mkdir -p reports
          
          files=$(jq -r '.[] | .file' <<< '${{ needs.setup.outputs.matrix }}')
          
          echo "# Commits Since Last Tag (All Tuyauterie Files)" > reports/commits-since-last-tag.txt
          echo "" >> reports/commits-since-last-tag.txt
          
          for file in $files; do
            echo "### $file" >> reports/commits-since-last-tag.txt
            echo "" >> reports/commits-since-last-tag.txt
            
            if git describe --tags --abbrev=0 > /dev/null 2>&1; then
              LAST_TAG=$(git describe --tags --abbrev=0)
              echo "Last tag: $LAST_TAG" >> reports/commits-since-last-tag.txt
              git log ${LAST_TAG}..HEAD --oneline >> reports/commits-since-last-tag.txt
            else
              echo "No tags found. Showing all commits:" >> reports/commits-since-last-tag.txt
              git log --oneline >> reports/commits-since-last-tag.txt
            fi
            
            echo "" >> reports/commits-since-last-tag.txt
            echo "---" >> reports/commits-since-last-tag.txt
            echo "" >> reports/commits-since-last-tag.txt
          done

      - name: Upload commit log
        uses: actions/upload-artifact@v7
        with:
          name: commits-since-last-tag
          path: reports/commits-since-last-tag.txt

  deployment-gitops:
    needs: [setup, build, build-docker, release-log]
    if: always() && needs.setup.outputs.gitops_deployment == 'true'
    runs-on: ${{ inputs.github-runner }}
    permissions:
      contents: read
    steps:
      - name: Checkout GitOps repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITOPS_REPOSITORY_TOKEN }}
          repository: ${{ needs.setup.outputs.gitops_repository }}

      - name: Update manifests
        run: |
          VERSION=""
          echo '${{ needs.setup.outputs.gitops_matrix }}' | jq -r '.[] | "\(.manifest) \(.version)"' | while read -r manifest version; do
            if [ -f "$manifest" ]; then
              echo "Updating $manifest to $version"
              sed -i -E "s|(ghcr.io/[^:]+):.*$|\1:$version|" "$manifest"
            else
              echo "Warning: Manifest not found: $manifest"
            fi
          done
          VERSION=$(echo '${{ needs.setup.outputs.gitops_matrix }}' | jq -r '.[0].version // ""')
          echo "DEPLOY_VERSION=$VERSION" >> $GITHUB_ENV

      - name: Commit & Push changes
        uses: actions-js/push@master
        with:
          github_token: ${{ secrets.GITOPS_REPOSITORY_TOKEN }}
          repository: ${{ needs.setup.outputs.gitops_repository }}
          message: "chore: autopublish ${{ github.repository }} ${{ env.DEPLOY_VERSION }}"
