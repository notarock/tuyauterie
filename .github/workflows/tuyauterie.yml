name: Reusable Tuyauterie Build

on:
  workflow_call:
    inputs:
      tuyauterie-path:
        description: 'Path to .tuyauterie.yaml file (deprecated, use tuyauterie-files instead)'
        required: false
        default: '.tuyauterie.yaml'
        type: string
      tuyauterie-files:
        description: 'Array of paths to .tuyauterie.yaml files (matrix strategy)'
        required: false
        default: '[".tuyauterie.yaml"]'
        type: string
      github-runner:
        description: 'The GitHub runner to use'
        required: false
        default: 'ubuntu-latest'
        type: string
      github-event:
        description: 'GitHub event that triggered the workflow'
        required: false
        default: 'push'
        type: string
    secrets:
      GITOPS_REPOSITORY_TOKEN:
        description: 'GitHub token for GitOps repository'
        required: false 

jobs:
  setup:
    runs-on: ${{ inputs.github-runner }}
    outputs:
      tuyauterie-files: ${{ steps.set-matrix.outputs.tuyauterie-files }}
    steps:
      - name: Set matrix from input
        id: set-matrix
        uses: actions/github-script@v8
        with:
          script: |
            // Use tuyauterie-files if provided, otherwise fall back to tuyauterie-path for backward compatibility
            const filesInput = '${{ inputs.tuyauterie-files }}';
            const pathInput = '${{ inputs.tuyauterie-path }}';
            
            let files;
            if (filesInput && filesInput !== '[]') {
              files = JSON.parse(filesInput);
            } else if (pathInput && pathInput !== '.tuyauterie.yaml') {
              files = [pathInput];
            } else {
              files = ['.tuyauterie.yaml'];
            }
            
            console.log(`Using tuyauterie files: ${JSON.stringify(files)}`);
            core.setOutput('tuyauterie-files', JSON.stringify(files));

  context:
    runs-on: ${{ inputs.github-runner }}
    needs: setup
    strategy:
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.tuyauterie-files) }}
    name: ${{ matrix.include }}
    outputs:
      build_type_${{ matrix.include }}: ${{ steps.context.outputs.build_type }}
      build_docker_${{ matrix.include }}: ${{ steps.context.outputs.build_docker }}
      publish_${{ matrix.include }}: ${{ steps.context.outputs.publish }}
      upload_artifacts_${{ matrix.include }}: ${{ steps.context.outputs.upload_artifacts }}
      is_tag_${{ matrix.include }}: ${{ steps.context.outputs.is_tag }}
      tag_name_${{ matrix.include }}: ${{ steps.context.outputs.tag_name }}
      artifact_name_${{ matrix.include }}: ${{ steps.context.outputs.artifact_name }}
      artifact_base_name_${{ matrix.include }}: ${{ steps.context.outputs.artifact_base_name }}
      project_path_${{ matrix.include }}: ${{ steps.context.outputs.project_path }}
      gitops-deployment_${{ matrix.include }}: ${{ steps.context.outputs.gitops-deployment }}
      gitops-target-repository_${{ matrix.include }}: ${{ steps.context.outputs.gitops-target-repository }}
      gitops-target-manifest_${{ matrix.include }}: ${{ steps.context.outputs.gitops-target-manifest }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up js-yaml
        run: npm install js-yaml

      - id: context
        name: Read build type from .tuyauterie.yaml
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');

            const yaml = require('./node_modules/js-yaml');
            const path = '${{ matrix.include }}';

            const fileContent = fs.readFileSync(path, 'utf8');
            const config = yaml.load(fileContent);
            
            console.log(`Parsed configuration: ${JSON.stringify(config)}`);

            const buildType = config?.build?.type ?? 'unknown';

            const projectPath = config?.build?.path ?? '.';
            core.setOutput('project_path', projectPath);

            const uploadArtifacts = config?.build?.upload_artifacts ?? false;
            core.setOutput('upload_artifacts', uploadArtifacts);

            console.log(`Detected build type: ${buildType}`);
            core.setOutput('build_type', buildType);
            
            const Dockerfile = config?.build?.dockerfile ?? 'Dockerfile';
            if (fs.existsSync(Dockerfile)) {
              console.log(`Dockerfile found: ${Dockerfile}, build_docker set to true`);
              core.setOutput('build_docker', "true");
            } else {
              console.log(`Dockerfile not found: ${Dockerfile}, build_docker set to false`);
              core.setOutput('build_docker', "false");
            }
            
            const event = '${{ inputs.github-event }}';

            const releaseOnTag = config?.release?.on_tag ?? true;

            console.log(`GitHub Ref: ${process.env.GITHUB_REF}`);
            
            const ref = process.env.GITHUB_REF ?? '';
            const isTag = ref.startsWith('refs/tags/');
            const tagName = isTag ? ref.replace('refs/tags/', '') : "";
            core.setOutput('is_tag', isTag);
            core.setOutput('tag_name', tagName);

            const artifactBaseName = config?.build?.artifact_name ?? '${{ github.event.repository.name }}';
            core.setOutput('artifact_base_name', artifactBaseName);
            if (isTag) {
              core.setOutput('artifact_name', `${artifactBaseName}-${tagName}`);
            } else {
              core.setOutput('artifact_name', artifactBaseName);
            }

            var publishing = false;
            if (releaseOnTag && isTag) {
              console.log(`Detected event: ${event}`);
              console.log(`Release on tag enabled, 'publish' set to true for Docker build`);
              core.setOutput('publish', "true");
              publishing = true;
            } else {
              console.log(`Detected event: ${event}`);
              console.log(`Condition for release unmet, 'publish' set to false for Docker build`);
              core.setOutput('publish', "false");
              publishing = false;
            }
            
            const deploy = config?.deploy ?? {};

            const enableDeployGitops = config?.deploy?.gitops.enable ?? false;
            if (enableDeployGitops && publishing) {
              console.log(`GitOps deployment enabled`);

              const gitopsTargetRepository = config?.deploy?.gitops?.repository ?? '';
              const gitopsTargetManifest = config?.deploy?.gitops?.manifest ?? '';

              core.setOutput('gitops-deployment', "true");
              core.setOutput('gitops-target-repository', gitopsTargetRepository);
              core.setOutput('gitops-target-manifest', gitopsTargetManifest);
            } else {
              console.log(`Not executing GitOps deployment`);
              core.setOutput('gitops-deployment', "false");
            }

      - id: Summary
        name: Write GitHub Summary
        uses: actions/github-script@v8
        with:
          script: |
            core.summary
              .addHeading(`🔧 Tuyauterie Build Context: ${{ matrix.include }}`)
              .addTable([
                ['Key', 'Value'],
                ['Git Ref', process.env.GITHUB_REF],
                ['Commit SHA', process.env.GITHUB_SHA],
                ['Actor', process.env.GITHUB_ACTOR],
                ['Runner OS', '${{ runner.os }}'],
                ['Job Name', `${{ env.GITHUB_JOB }} (matrix: ${{ matrix.include }})`],
                ['Workflow', process.env.GITHUB_WORKFLOW],
                ['Repository', process.env.GITHUB_REPOSITORY],
                ['Run ID', process.env.GITHUB_RUN_ID],
                ['Build Type', '${{ steps.context.outputs.build_type }}'],
                ['Build Path', '${{ steps.context.outputs.project_path }}'],
                ['Docker Build', '${{ steps.context.outputs.build_docker }}'],
                ['Publish', '${{ steps.context.outputs.publish }}'],
                ['Artifact Name', '${{ steps.context.outputs.artifact_name }}'],
                ['Upload Artifact', '${{ steps.context.outputs.upload_artifacts }}'],
                ['GitHub Event', '${{ inputs.github-event }}'],
                ['Is Tag', '${{ steps.context.outputs.is_tag }}'],
                ['Tag Name', '${{ steps.context.outputs.tag_name }}'],
                ['GitOps Deployment', '${{ steps.context.outputs.gitops-deployment }}'],
                ['GitOps Target Repository', '${{ steps.context.outputs.gitops-target-repository }}'],
                ['GitOps Target Manifest', '${{ steps.context.outputs.gitops-target-manifest }}']
              ])
              .addLink('View this run', `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`)
              .write();

  build:
    needs: [setup, context]
    runs-on: ${{ inputs.github-runner }}
    strategy:
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.tuyauterie-files) }}
    name: ${{ matrix.include }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6

      - name: Build (Golang)
        if: needs.context.outputs.build_type_${{ matrix.include }} == 'golang'
        uses: notarock/tuyauterie/.github/actions/build-golang@main
        with:
          project-path: ${{ needs.context.outputs.project_path_${{ matrix.include }} }}
          upload-artifact: ${{ needs.context.outputs.publish_${{ matrix.include }} == 'true' && needs.context.outputs.upload_artifacts_${{ matrix.include }} == 'true' }}
          artifact-name: ${{ needs.context.outputs.artifact_name_${{ matrix.include }} }}

      - name: Build (Python)
        if: needs.context.outputs.build_type_${{ matrix.include }} == 'python'
        uses: notarock/tuyauterie/.github/actions/build-python@main
        with:
          project-path: ${{ needs.context.outputs.project_path_${{ matrix.include }} }}

      - name: Build (Nix)
        if: needs.context.outputs.build_type_${{ matrix.include }} == 'nix'
        uses: notarock/tuyauterie/.github/actions/build-nix@main
        with:
          project-path: ${{ needs.context.outputs.project_path_${{ matrix.include }} }}

      - name: Build (Node)
        if: needs.context.outputs.build_type_${{ matrix.include }} == 'node'
        uses: notarock/tuyauterie/.github/actions/build-node@main
        with:
          project-path: ${{ needs.context.outputs.project_path_${{ matrix.include }} }}
          upload-artifact: ${{ needs.context.outputs.publish_${{ matrix.include }} == 'true' && needs.context.outputs.upload_artifacts_${{ matrix.include }} == 'true' }}
          artifact-name: ${{ needs.context.outputs.artifact_name_${{ matrix.include }} }}

  build-docker:
    needs: [setup, context, build]
    if: ${{ needs.context.outputs.build_docker_${{ matrix.include }} == 'true' }}
    strategy:
      matrix:
        include: ${{ fromJSON(needs.setup.outputs.tuyauterie-files) }}
    name: ${{ matrix.include }}
    uses: ./.github/workflows/build-docker.yml
    with:
      publish-image: ${{ needs.context.outputs.publish_${{ matrix.include }} == 'true' }}
      upload-artifact: ${{ needs.context.outputs.publish_${{ matrix.include }} == 'true' && needs.context.outputs.upload_artifacts_${{ matrix.include }} == 'true' }}
      artifact-name: ${{ needs.context.outputs.artifact_base_name_${{ matrix.include }} }}
      project-path: ${{ needs.context.outputs.project_path_${{ matrix.include }} }}
      github-runner: ${{ inputs.github-runner }}
    secrets:
      docker-registry-token: ${{ secrets.GITHUB_TOKEN }}

  release-log:
    needs: [setup, context, build, build-docker]
    if: |
      always() &&
      needs.setup.result == 'success' &&
      (needs.context.result == 'success' || needs.context.result == 'skipped') &&
      (needs.build.result == 'success' || needs.build.result == 'skipped') &&
      (needs.build-docker.result == 'success' || needs.build-docker.result == 'skipped' || needs.build-docker.result == 'failure')
    runs-on: ${{ inputs.github-runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate consolidated commit log
        run: |
          git fetch --tags
          mkdir -p reports
          
          # Get all tuyauterie files from setup output
          files=$(jq -r '.[]' <<< '${{ needs.setup.outputs.tuyauterie-files }}')
          
          echo "# Commits Since Last Tag (All Tuyauterie Files)" > reports/commits-since-last-tag.txt
          echo "" >> reports/commits-since-last-tag.txt
          
          for file in $files; do
            echo "### $file" >> reports/commits-since-last-tag.txt
            echo "" >> reports/commits-since-last-tag.txt
            
            if git describe --tags --abbrev=0 > /dev/null 2>&1; then
              LAST_TAG=$(git describe --tags --abbrev=0)
              echo "Last tag: $LAST_TAG" >> reports/commits-since-last-tag.txt
              git log ${LAST_TAG}..HEAD --oneline >> reports/commits-since-last-tag.txt
            else
              echo "No tags found. Showing all commits:" >> reports/commits-since-last-tag.txt
              git log --oneline >> reports/commits-since-last-tag.txt
            fi
            
            echo "" >> reports/commits-since-last-tag.txt
            echo "---" >> reports/commits-since-last-tag.txt
            echo "" >> reports/commits-since-last-tag.txt
          done

      - name: Upload commit log
        uses: actions/upload-artifact@v7
        with:
          name: commits-since-last-tag
          path: reports/commits-since-last-tag.txt

  deployment-gitops:
    needs: [setup, context, build, build-docker, release-log]
    if: always()
    runs-on: ${{ inputs.github-runner }}
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Collect GitOps configs from all matrix jobs
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require('fs');
            
            const contextOutputs = JSON.parse('${{ toJSON(needs.context.outputs) }}');
            const files = JSON.parse('${{ needs.setup.outputs.tuyauterie-files }}');
            
            const gitopsConfigs = {};
            
            // Parse outputs with suffix pattern: gitops-deployment_.tuyauterie.yaml
            for (const file of files) {
              const sanitizedFile = file.replace(/[^a-zA-Z0-9]/g, '_');
              
              const deployment = contextOutputs[`gitops-deployment_${sanitizedFile}`];
              const repository = contextOutputs[`gitops-target-repository_${sanitizedFile}`];
              const manifest = contextOutputs[`gitops-target-manifest_${sanitizedFile}`];
              const version = contextOutputs[`tag_name_${sanitizedFile}`] || 'latest';
              
              if (deployment === 'true' && repository && manifest) {
                if (!gitopsConfigs[repository]) {
                  gitopsConfigs[repository] = { repository, manifests: [] };
                }
                gitopsConfigs[repository].manifests.push({ manifest, version, file });
              }
            }
            
            const uniqueConfigs = Object.values(gitopsConfigs);
            
            fs.writeFileSync('gitops-configs.json', JSON.stringify(uniqueConfigs, null, 2));
            console.log(`Found ${uniqueConfigs.length} unique GitOps repositories to update`);
            console.log(JSON.stringify(uniqueConfigs, null, 2));

      - name: Update all manifests
        env:
          GITOPS_TOKEN: ${{ secrets.GITOPS_REPOSITORY_TOKEN }}
        run: |
          set -x
          
          if [ ! -f gitops-configs.json ]; then
            echo "No GitOps configurations found"
            exit 0
          fi
          
          # Get unique repositories
          repos=$(jq -r '.[].repository' gitops-configs.json | sort -u)
          
          for repo in $repos; do
            echo "Processing repository: $repo"
            
            clone_dir=".gitops-temp-$(echo "$repo" | tr '/' '-')"
            if [ ! -d "$clone_dir" ]; then
              git clone --depth 1 "https://github.com/$repo.git" "$clone_dir"
            fi
            
            cd "$clone_dir"
            
            branch="tuyauterie-update-$(date +%Y%m%d-%H%M%S)"
            git checkout -b "$branch"
            
            # Get manifests for this repo
            jq -r --arg repo "$repo" '.[] | select(.repository == $repo) | .manifests[] | "\(.file):\(.manifest):\(.version)"' gitops-configs.json | while IFS=: read -r file manifest version; do
              if [ -f "$manifest" ]; then
                echo "Updating $manifest (from $file) to version $version"
                sed -i -E "s|(ghcr.io/[^:]+):.*$|\1:$version|" "$manifest"
              else
                echo "Warning: Manifest not found: $manifest"
              fi
            done
            
            git config user.name "GitHub Actions"
            git config user.email "actions@github.com"
            git add .
            git commit -m "chore: autopublish tuyauterie builds"
            git push origin "$branch"
            
            cd ..
          done
