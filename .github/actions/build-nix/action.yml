name: Build Nix
description: Build a Nix flake project

inputs:
  project-path:
    description: 'Path to the Nix flake within the repository'
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - uses: DeterminateSystems/nix-installer-action@main

    - uses: DeterminateSystems/magic-nix-cache-action@main

    - name: Build flake (build, test)
      working-directory: ${{ inputs.project-path }}
      run: nix build
      shell: bash
