name: Build Python
description: Lint and test a Python project

inputs:
  python-version:
    description: 'The Python version to use'
    required: false
    default: '3.13'
  project-path:
    description: 'Path to the Python project within the repository'
    required: false
    default: '.'

runs:
  using: composite
  steps:
    - name: Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '${{ inputs.python-version }}'

    - uses: astral-sh/ruff-action@v3

    - name: Install pytest
      working-directory: ${{ inputs.project-path }}
      run: |
        python -m pip install --upgrade pip
        pip install pytest
      shell: bash

    - name: Run pytest
      working-directory: ${{ inputs.project-path }}
      run: pytest
      shell: bash
